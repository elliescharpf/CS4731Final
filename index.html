<!DOCTYPE html>
<html>
<head>
  <title>Campsite</title>
  <style>
    body { margin: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; color: #fff; }
    #gl-canvas { display: block; border: 1px solid #333; }
    #info { margin-top: 10px; font-size: 13px; text-align: center; color: #aaa; }
    #status { margin-top: 4px; font-size: 12px; color: #f90; }
  </style>
</head>
<body>

<script id="skybox-vertex" type="x-shader/x-vertex">
attribute vec3 aPosition;
uniform mat4 uView;
uniform mat4 uProj;
varying vec3 vDir;
void main() {
    vDir = aPosition;
    // Forces the skybox to always be infinitely far away behind everything else
    vec4 pos = uProj * uView * vec4(aPosition, 1.0);
    gl_Position = pos.xyww;
}
</script>
<script id="skybox-fragment" type="x-shader/x-fragment">
precision mediump float;
varying vec3 vDir;
uniform samplerCube uSkybox; // A 3D texture mapping out all 6 sides of the sky
void main() {
    gl_FragColor = textureCube(uSkybox, normalize(vDir));
}
</script>

<script id="vertex-shader" type="x-shader/x-vertex">
attribute vec4 vPosition;
attribute vec3 vNormal;
attribute vec2 vTexCoord;

// Matrices to transform our 3D coordinates into a 2D screen space
uniform mat4 uModel;
uniform mat4 uView;
uniform mat4 uProj;
uniform mat4 uNormalMat;

// Data passed to the fragment shader
varying vec3 fPos;
varying vec3 fNormal;
varying vec2 fTexCoord;

void main() {
    vec4 worldPos = uModel * vPosition;
    fPos = worldPos.xyz;
    fNormal = mat3(uNormalMat) * vNormal; // Adjust normals based on model rotation
    fTexCoord = vTexCoord;
    gl_Position = uProj * uView * worldPos;
}
</script>

<script id="fragment-shader" type="x-shader/x-fragment">
precision mediump float;

varying vec3 fPos;
varying vec3 fNormal;
varying vec2 fTexCoord;

// Lighting setups with two light sources: the campfire and the lantern
uniform vec3  uLightPos;
uniform vec3  uLightColor;
uniform float uLightOn;

uniform vec3  uLanternPos;
uniform vec3  uLanternColor;
uniform float uLanternOn;

uniform vec3  uAmbientColor;
uniform vec3  uCameraPos;

// Material properties
uniform vec4  uAmbient;
uniform vec4  uDiffuse;
uniform vec4  uSpecular;
uniform float uShininess;

uniform sampler2D uTex;
uniform float     uUseTex;
uniform vec3      uEmissive; // Makes an object glow independent of light sources

// Helper function to calculate lighting drop off (attenuation) and shininess (specular)
vec3 pointLight(vec3 lPos, vec3 lColor, vec3 N, vec3 V, vec3 baseRgb) {
    vec3  L    = normalize(lPos - fPos);
    float dist  = length(lPos - fPos);
    float atten = 1.0 / (1.0 + 0.18*dist + 0.06*dist*dist); // Fades out with distance
    float diff  = max(dot(N, L), 0.0); // How directly the light hits the surface
    vec3  R     = reflect(-L, N);
    float spec  = pow(max(dot(V, R), 0.0), uShininess); // The shiny bright spot
    return lColor * atten * (baseRgb * diff + uSpecular.rgb * spec);
}

void main() {
    vec3 N = normalize(fNormal);
    vec3 V = normalize(uCameraPos - fPos); // Vector pointing to the camera

    vec4 baseColor = uUseTex > 0.5
        ? texture2D(uTex, fTexCoord)
        : uDiffuse;

    // Start with our base ambient light (moonlight)
    vec3 color = uAmbient.rgb * uAmbientColor;

    // Add campfire light if it's toggled on
    if (uLightOn > 0.5)
        color += pointLight(uLightPos,   uLightColor,   N, V, baseColor.rgb);

    // Add lantern light
    if (uLanternOn > 0.5)
        color += pointLight(uLanternPos, uLanternColor, N, V, baseColor.rgb);

    // Add lantern glow
    color += uEmissive * baseColor.rgb;

    gl_FragColor = vec4(color, baseColor.a);
}
</script>

<script id="shadow-vertex" type="x-shader/x-vertex">
attribute vec4 vPosition;
uniform mat4 uShadowMat;
uniform mat4 uView;
uniform mat4 uProj;
void main() {
    gl_Position = uProj * uView * uShadowMat * vPosition;
}
</script>
<script id="shadow-fragment" type="x-shader/x-fragment">
precision mediump float;
void main() {
    gl_FragColor = vec4(0.0, 0.0, 0.0, 0.85);
}
</script>

<script id="envmap-vertex" type="x-shader/x-vertex">
attribute vec4 vPosition;
attribute vec3 vNormal;
uniform mat4 uModel;
uniform mat4 uView;
uniform mat4 uProj;
uniform mat4 uNormalMat;
varying vec3 fPos;
varying vec3 fNormal;
void main() {
    vec4 worldPos = uModel * vPosition;
    fPos = worldPos.xyz;
    fNormal = mat3(uNormalMat) * vNormal;
    gl_Position = uProj * uView * worldPos;
}
</script>

<script id="reflect-fragment" type="x-shader/x-fragment">
precision mediump float;
varying vec3 fPos;
varying vec3 fNormal;
uniform vec3 uCameraPos;
uniform samplerCube uSkybox;
uniform float uRefractRatio;
uniform float uIsRefract;
void main() {
    vec3 N = normalize(fNormal);
    vec3 V = normalize(fPos - uCameraPos);
    vec3 dir;
    if (uIsRefract > 0.5) {
        dir = refract(V, N, uRefractRatio);
        float fresnel = pow(1.0 - abs(dot(-V, N)), 3.0);
        float alpha   = mix(0.35, 0.75, fresnel);
        gl_FragColor  = vec4(textureCube(uSkybox, dir).rgb, alpha);
    } else {
        dir = reflect(V, N);
        gl_FragColor = textureCube(uSkybox, dir);
    }
}
</script>

<script id="puddle-vertex" type="x-shader/x-vertex">
attribute vec4 vPosition;
uniform mat4 uModel;
uniform mat4 uView;
uniform mat4 uProj;
varying vec4 vClipPos;
void main() {
    vec4 pos = uProj * uView * uModel * vPosition;
    vClipPos = pos;
    gl_Position = pos;
}
</script>

<script id="puddle-fragment" type="x-shader/x-fragment">
precision mediump float;
varying vec4 vClipPos;
uniform sampler2D uReflTex;
uniform float uTime;
void main() {
    vec2 ndc = (vClipPos.xy / vClipPos.w) * 0.5 + 0.5;
    
    // Add a tiny bit of animated water distortion using sine waves
    ndc.x += sin(ndc.y * 30.0 + uTime * 2.0) * 0.003;
    ndc.y += cos(ndc.x * 30.0 + uTime * 2.5) * 0.003;
    ndc = clamp(ndc, 0.002, 0.998); // Stop artifacts at the exact edges

    vec4 reflColor = texture2D(uReflTex, ndc);
    
    // Tint the reflection slightly muddy so it looks like a puddle, not a mirror
    vec3 waterTint = vec3(0.05, 0.10, 0.15);
    gl_FragColor = vec4(mix(reflColor.rgb, waterTint, 0.25), 0.95);
}
</script>

<script id="fire-vertex" type="x-shader/x-vertex">
attribute vec4 vPosition;
uniform mat4 uModel;
uniform mat4 uView;
uniform mat4 uProj;
varying float vHeight;
void main() {
    vHeight = vPosition.y; // Pass the Y coordinate to the fragment so it fades out at the top
    gl_Position = uProj * uView * uModel * vPosition;
}
</script>
<script id="fire-fragment" type="x-shader/x-fragment">
precision mediump float;
varying float vHeight;
uniform float uTime;
uniform float uFlicker;
void main() {
    float t = clamp(vHeight, 0.0, 1.0);
    // Gradient from yellow at the bottom to orange/red at the top
    vec3 fireColor = mix(vec3(1.0, 0.9, 0.1), vec3(1.0, 0.1, 0.0), t);
    float alpha = (1.0 - t) * uFlicker; // Fade out near the top and flicker based on time
    gl_FragColor = vec4(fireColor, alpha);
}
</script>

<script src="lib/webgl-utils.js"></script>
<script src="lib/initShaders.js"></script>
<script src="lib/MV.js"></script>
<script src="lib/objLoader.js"></script>
<script src="main.js"></script>

<canvas id="gl-canvas" width="700" height="700"></canvas>
<div id="info">
  Arrow Keys: Rotate Camera &nbsp;|&nbsp;
  C: Toggle Camera Auto-Rotate &nbsp;|&nbsp;
  S: Toggle Shadows &nbsp;|&nbsp;
  D: Toggle Campfire Light &nbsp;|&nbsp;
  A: Toggle Lantern Swing 
</div>
<div id="status">Loading...</div>
</body>
</html>
